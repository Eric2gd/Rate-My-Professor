<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate My Prof - Departments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r hidden lg:flex flex-col">
        <div class="p-6 flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg">
                <i class="fas fa-university text-white text-xl"></i>
            </div>
            <span class="text-xl font-bold text-gray-800 tracking-tight">RateMyProf</span>
        </div>

        <nav class="flex-1 mt-4">
            <p class="px-6 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Main Menu</p>
            <a href="dashboard.html" class="flex items-center px-6 py-3 text-gray-500 hover:bg-gray-50">
                <i class="fas fa-th-large w-5"></i> <span class="ml-3">Home</span>
            </a>
            <a href="dashboard.html" class="flex items-center px-6 py-3 text-gray-500 hover:bg-gray-50">
                <i class="fas fa-chalkboard-teacher w-5"></i> <span class="ml-3">Professors</span>
            </a>
            <a href="departments.html" class="flex items-center px-6 py-3 sidebar-active">
                <i class="fas fa-building w-5"></i> <span class="ml-3 font-medium">Departments</span>
            </a>
            <a href="dashboard.html" class="flex items-center px-6 py-3 text-gray-500 hover:bg-gray-50">
                <i class="fas fa-star w-5"></i> <span class="ml-3">Reviews</span>
            </a>

            <p class="px-6 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-8 mb-2">Account</p>
            <div id="nav-guest">
                <a href="login.html" class="flex items-center px-6 py-3 text-gray-500 hover:bg-gray-50">
                    <i class="fas fa-sign-in-alt w-5"></i> <span class="ml-3">Sign In</span>
                </a>
                <a href="register.html" class="flex items-center px-6 py-3 text-gray-500 hover:bg-gray-50">
                    <i class="fas fa-user-plus w-5"></i> <span class="ml-3">Register</span>
                </a>
            </div>
            <div id="nav-loggedin" class="hidden">
                <a href="#" class="flex items-center px-6 py-3 text-gray-500 hover:bg-gray-50">
                    <i class="fas fa-user-circle w-5"></i> <span id="nav-username" class="ml-3 truncate">Profile</span>
                </a>
                <button onclick="logout()" class="w-full flex items-center px-6 py-3 text-gray-500 hover:bg-red-50 hover:text-red-500 transition">
                    <i class="fas fa-sign-out-alt w-5"></i> <span class="ml-3">Log Out</span>
                </button>
            </div>
        </nav>

        <div class="m-4 p-4 bg-gray-50 rounded-2xl border border-gray-100">
            <p id="sidebar-username" class="text-xs text-gray-400 mb-1">Not logged in</p>
            <p class="text-sm font-bold text-gray-800">RateMyProf</p>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col">
        <!-- Header -->
        <header class="bg-white h-16 border-b flex items-center justify-between px-8">
            <div class="flex items-center gap-3 text-gray-500">
                <a href="dashboard.html" class="hover:text-indigo-600 text-sm font-medium">Dashboard</a>
                <i class="fas fa-chevron-right text-xs text-gray-300"></i>
                <span class="text-sm font-semibold text-gray-800">Departments</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="relative w-64">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search text-sm"></i>
                    </span>
                    <input id="search-input" type="search" placeholder="Filter by department..."
                        class="block w-full pl-9 pr-3 py-2 border border-gray-100 rounded-lg bg-gray-50 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-indigo-500 text-sm">
                </div>
                <div class="flex items-center gap-3 border-l pl-6">
                    <div class="text-right">
                        <p id="header-username" class="text-sm font-bold text-gray-800">Guest</p>
                        <a href="login.html" id="header-action" class="text-xs text-indigo-500 hover:underline">Sign in</a>
                    </div>
                    <img id="header-avatar" class="h-10 w-10 rounded-full object-cover border-2 border-indigo-100"
                         src="https://ui-avatars.com/api/?name=Guest&background=6366f1&color=fff" alt="User">
                </div>
            </div>
        </header>

        <!-- Page content -->
        <div class="p-8">
            <div class="mb-8">
                <h1 class="text-2xl font-extrabold text-gray-800">Departments</h1>
                <p class="text-sm text-gray-400 mt-1">Browse professors by department and see average ratings.</p>
            </div>

            <div id="departments-container" class="space-y-6">
                <p class="text-gray-400 text-sm">Loading...</p>
            </div>
        </div>
    </main>

    <script>
        const API = "http://localhost:3000";

        function getUsernameFromToken(token) {
            try { return JSON.parse(atob(token.split(".")[1])).username || "User"; }
            catch { return "User"; }
        }

        function renderStars(avg) {
            const full  = Math.floor(avg);
            const half  = avg - full >= 0.5;
            const empty = 5 - full - (half ? 1 : 0);
            return '<i class="fas fa-star text-yellow-400"></i>'.repeat(full) +
                   (half ? '<i class="fas fa-star-half-alt text-yellow-400"></i>' : '') +
                   '<i class="far fa-star text-gray-200"></i>'.repeat(empty);
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function initUser() {
            const token = localStorage.getItem("token");
            if (!token) return;
            const username = getUsernameFromToken(token);
            document.getElementById("header-username").textContent = username;
            document.getElementById("header-avatar").src =
                `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=6366f1&color=fff`;
            const action = document.getElementById("header-action");
            action.textContent = "View Profile";
            action.removeAttribute("href");
            document.getElementById("sidebar-username").textContent = username;
            document.getElementById("nav-username").textContent = username;
            document.getElementById("nav-guest").classList.add("hidden");
            document.getElementById("nav-loggedin").classList.remove("hidden");
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("username");
            window.location.href = "login.html";
        }

        async function loadDepartments() {
            const [profsRes, reviewsRes] = await Promise.all([
                fetch(`${API}/professors`),
                fetch(`${API}/reviews`)
            ]);
            const professors = await profsRes.json();
            const reviews    = await reviewsRes.json();

            // Group professors by department
            const deptMap = {};
            professors.forEach(p => {
                if (!deptMap[p.department]) deptMap[p.department] = { professors: [], ratings: [] };
                deptMap[p.department].professors.push(p);
            });

            // Attach ratings to departments
            reviews.forEach(r => {
                const prof = professors.find(p => p.id === r.professor_id);
                if (prof && deptMap[prof.department]) deptMap[prof.department].ratings.push(r.rating);
            });

            const container = document.getElementById("departments-container");
            const depts = Object.entries(deptMap);

            if (depts.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-sm">No departments found.</p>`;
                return;
            }

            // Check if URL has a ?dept= filter
            const params = new URLSearchParams(window.location.search);
            const filter = params.get("dept");

            const filtered = filter
                ? depts.filter(([name]) => name === filter)
                : depts;

            container.innerHTML = filtered.map(([name, data]) => {
                const avg = data.ratings.length
                    ? (data.ratings.reduce((s, r) => s + r, 0) / data.ratings.length)
                    : null;

                return `
                    <div class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-50 dept-card" data-dept="${escapeHtml(name)}">
                        <!-- Department header -->
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-4">
                                <div class="bg-indigo-50 p-3 rounded-2xl">
                                    <i class="fas fa-building text-indigo-500 text-xl"></i>
                                </div>
                                <div>
                                    <h2 class="text-lg font-extrabold text-gray-800">${escapeHtml(name)}</h2>
                                    <p class="text-xs text-gray-400">${data.professors.length} professor${data.professors.length !== 1 ? "s" : ""} · ${data.ratings.length} review${data.ratings.length !== 1 ? "s" : ""}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-extrabold text-gray-800">${avg ? avg.toFixed(1) : "N/A"}</p>
                                <div class="flex justify-end text-sm mt-0.5">
                                    ${avg ? renderStars(avg) : '<span class="text-xs text-gray-400">No ratings yet</span>'}
                                </div>
                            </div>
                        </div>

                        <!-- Professors in this department -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            ${data.professors.map(p => `
                                <a href="professor-profile.html?id=${p.id}"
                                   class="flex items-center gap-3 p-3 rounded-2xl border border-gray-100 hover:border-indigo-200 hover:bg-indigo-50 transition group">
                                    <img class="w-10 h-10 rounded-full flex-shrink-0"
                                         src="https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=6366f1&color=fff&size=80" alt="${escapeHtml(p.name)}">
                                    <div>
                                        <p class="text-sm font-semibold text-gray-800 group-hover:text-indigo-600">${escapeHtml(p.name)}</p>
                                        <p class="text-xs text-gray-400">View profile</p>
                                    </div>
                                    <i class="fas fa-chevron-right text-gray-300 text-xs ml-auto group-hover:text-indigo-400"></i>
                                </a>`).join("")}
                        </div>
                    </div>`;
            }).join("");
        }

        // Search filter
        document.getElementById("search-input").addEventListener("input", function () {
            const q = this.value.toLowerCase();
            document.querySelectorAll(".dept-card").forEach(card => {
                card.style.display = card.dataset.dept.toLowerCase().includes(q) ? "" : "none";
            });
        });

        initUser();
        loadDepartments();
    </script>
</body>
</html>
