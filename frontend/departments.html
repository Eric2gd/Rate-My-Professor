<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate My Prof - Departments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="theme.js"></script>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="rmp-sidebar hidden lg:flex">
        <!-- Logo + pin -->
        <div class="rmp-logo">
            <div class="rmp-logo-icon"><i class="fas fa-university"></i></div>
            <span class="rmp-label text-base font-bold text-gray-800" style="flex:1">RateMyProf</span>
            <button id="pin-btn" class="rmp-pin-btn" onclick="togglePin()" title="Pin sidebar">
                <i class="fas fa-thumbtack"></i>
            </button>
        </div>

        <nav class="rmp-nav">
            <span class="rmp-section-title">MENU</span>
            <a href="dashboard.html" class="rmp-nav-item">
                <i class="fas fa-th-large"></i><span class="rmp-label">Home</span>
            </a>
            <a href="professors.html" class="rmp-nav-item">
                <i class="fas fa-chalkboard-teacher"></i><span class="rmp-label">Professors</span>
            </a>
            <a href="departments.html" class="rmp-nav-item rmp-active">
                <i class="fas fa-building"></i><span class="rmp-label">Departments</span>
            </a>
            <a href="my-reviews.html" class="rmp-nav-item">
                <i class="fas fa-star"></i><span class="rmp-label">My Reviews</span>
            </a>

            <span class="rmp-section-title">ACCOUNT</span>
            <div id="nav-guest">
                <a href="login.html" class="rmp-nav-item">
                    <i class="fas fa-sign-in-alt"></i><span class="rmp-label">Sign In</span>
                </a>
                <a href="register.html" class="rmp-nav-item">
                    <i class="fas fa-user-plus"></i><span class="rmp-label">Register</span>
                </a>
            </div>
            <div id="nav-loggedin" class="hidden">
                <a href="settings.html" class="rmp-nav-item">
                    <i class="fas fa-user-circle"></i><span id="nav-username" class="rmp-label truncate">Profile</span>
                </a>
                <button onclick="logout()" class="rmp-nav-item" style="color:#ef4444" onmouseover="this.style.background='rgba(254,242,242,0.8)'" onmouseout="this.style.background=''">
                    <i class="fas fa-sign-out-alt"></i><span class="rmp-label">Log Out</span>
                </button>
            </div>
        </nav>

        <div class="rmp-footer">
            <img id="sidebar-avatar" class="rmp-footer-avatar"
                 src="https://ui-avatars.com/api/?name=Guest&background=6366f1&color=fff" alt="">
            <div class="rmp-label" style="min-width:0">
                <p id="sidebar-username" class="text-xs font-semibold text-gray-700 truncate" style="max-width:140px">Not logged in</p>
                <a href="settings.html" class="text-[10px] text-indigo-400 hover:underline">View Profile</a>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col">
        <!-- Header -->
        <header class="h-16 flex items-center justify-between px-4 sm:px-6 glass-header">
            <!-- Mobile logo -->
            <div class="flex items-center gap-2 sm:hidden">
                <div class="rmp-logo-icon" style="width:34px;height:34px;font-size:14px"><i class="fas fa-university"></i></div>
                <span class="text-base font-bold text-gray-800">RateMyProf</span>
            </div>
            <!-- Desktop breadcrumb -->
            <div class="hidden sm:flex items-center gap-2 text-gray-500">
                <a href="dashboard.html" class="hover:text-indigo-600 text-sm font-medium">Dashboard</a>
                <i class="fas fa-chevron-right text-xs text-gray-300"></i>
                <span class="text-sm font-semibold text-gray-800">Departments</span>
            </div>
            <div class="flex items-center gap-3">
                <!-- Notification bell -->
                <div id="notif-wrapper">
                    <button class="glass-bell" id="notif-bell" onclick="toggleNotifications()">
                        <i class="far fa-bell text-gray-600 text-base"></i>
                        <span id="notif-badge" class="notif-badge hidden"></span>
                    </button>
                    <div id="notif-dropdown" class="notif-dropdown hidden">
                        <div class="notif-header">
                            <h3>Notifications</h3>
                            <span id="notif-header-count" class="notif-header-count hidden"></span>
                        </div>
                        <div id="notif-list" class="notif-list"></div>
                    </div>
                </div>
                <div class="glass-user-chip">
                    <img id="header-avatar" class="h-9 w-9 rounded-xl object-cover border-2 border-white/70"
                         src="https://ui-avatars.com/api/?name=Guest&background=6366f1&color=fff" alt="User">
                    <div class="text-left">
                        <p id="header-username" class="text-sm font-bold text-gray-800 leading-tight">Guest</p>
                        <a href="login.html" id="header-action" class="text-xs text-indigo-500 hover:underline leading-tight">Sign in</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page content -->
        <div class="p-4 sm:p-8">
            <div class="mb-6">
                <h1 class="text-2xl font-extrabold text-gray-800">Departments</h1>
                <p class="text-sm text-gray-400 mt-1">Browse professors by department and see average ratings.</p>
            </div>
            <!-- Search -->
            <div class="glass-search relative mb-6">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 pointer-events-none">
                    <i class="fas fa-search text-sm"></i>
                </span>
                <input id="search-input" type="search" placeholder="Filter departments..." class="block w-full pl-9 pr-3 py-2.5 text-sm">
            </div>

            <div id="departments-container" class="space-y-6">
                <p class="text-gray-400 text-sm">Loading...</p>
            </div>
        </div>
        <div class="mobile-nav-spacer lg:hidden flex-shrink-0"></div>
    </main>

    <script>
        const API = "https://rate-my-professor-phi.vercel.app";

        // ── Sidebar pin ───────────────────────────────────────────────────
        const sidebar = document.getElementById('sidebar');
        if (localStorage.getItem('sidebarPinned') === 'true') sidebar.classList.add('pinned');
        function togglePin() {
            sidebar.classList.toggle('pinned');
            localStorage.setItem('sidebarPinned', sidebar.classList.contains('pinned'));
            document.getElementById('pin-btn').querySelector('i').className =
                sidebar.classList.contains('pinned') ? 'fas fa-times' : 'fas fa-thumbtack';
        }

        function toggleDept(header) {
            const body  = header.nextElementSibling;   // .dept-body
            const arrow = header.querySelector(".dept-arrow");
            const isHidden = body.classList.toggle("hidden");
            arrow.style.transform = isHidden ? "rotate(0deg)" : "rotate(180deg)";
        }

        function getUsernameFromToken(token) {
            try { return JSON.parse(atob(token.split(".")[1])).username || "User"; }
            catch { return "User"; }
        }

        function renderStars(avg) {
            const full  = Math.floor(avg);
            const half  = avg - full >= 0.5;
            const empty = 5 - full - (half ? 1 : 0);
            return '<i class="fas fa-star text-yellow-400"></i>'.repeat(full) +
                   (half ? '<i class="fas fa-star-half-alt text-yellow-400"></i>' : '') +
                   '<i class="far fa-star text-gray-200"></i>'.repeat(empty);
        }

        // Strip academic titles so ui-avatars shows correct initials (e.g. "Dr. Nathan Amanquah" → "NA")
        function cleanName(name) {
            return name.replace(/^(Dr|Prof|Mr|Mrs|Ms|Miss)\.?\s+/i, '').trim();
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function initUser() {
            const token = localStorage.getItem("token");
            if (!token) return;
            const username = getUsernameFromToken(token);
            document.getElementById("header-username").textContent = username;
            document.getElementById("header-avatar").src =
                `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=6366f1&color=fff`;
            const action = document.getElementById("header-action");
            action.style.display = 'none';
            document.getElementById("sidebar-username").textContent = username;
            document.getElementById("sidebar-avatar").src =
                `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=6366f1&color=fff`;
            document.getElementById("nav-username").textContent = username;
            document.getElementById("nav-guest").classList.add("hidden");
            document.getElementById("nav-loggedin").classList.remove("hidden");

            // Fetch real profile picture
            try {
                const res = await fetch(`${API}/users/me`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    if (user.profile_picture) {
                        document.getElementById("header-avatar").src = `${API}/${user.profile_picture}`;
                        document.getElementById("sidebar-avatar").src = `${API}/${user.profile_picture}`;
                    }
                }
            } catch {}
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("username");
            window.location.href = "login.html";
        }

        async function loadDepartments() {
            const [profsRes, reviewsRes] = await Promise.all([
                fetch(`${API}/professors`),
                fetch(`${API}/reviews`)
            ]);
            const professors = await profsRes.json();
            const reviews    = await reviewsRes.json();

            // Group professors by department
            const deptMap = {};
            professors.forEach(p => {
                if (!deptMap[p.department]) deptMap[p.department] = { professors: [], ratings: [] };
                deptMap[p.department].professors.push(p);
            });

            // Attach ratings to departments
            reviews.forEach(r => {
                const prof = professors.find(p => p.id === r.professor_id);
                if (prof && deptMap[prof.department]) deptMap[prof.department].ratings.push(r.rating);
            });

            const container = document.getElementById("departments-container");
            const depts = Object.entries(deptMap);

            if (depts.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-sm">No departments found.</p>`;
                return;
            }

            // Check if URL has a ?dept= filter
            const params = new URLSearchParams(window.location.search);
            const filter = params.get("dept");

            const filtered = filter
                ? depts.filter(([name]) => name === filter)
                : depts;

            container.innerHTML = filtered.map(([name, data], i) => {
                const avg = data.ratings.length
                    ? (data.ratings.reduce((s, r) => s + r, 0) / data.ratings.length)
                    : null;

                // Sort professors alphabetically within each department
                const sorted = [...data.professors].sort((a, b) => a.name.localeCompare(b.name));

                return `
                    <div class="rmp-anim bg-white rounded-[32px] shadow-sm border border-gray-50 dept-card"
                         data-dept="${escapeHtml(name)}" style="animation-delay:${i * 0.08}s">
                        <!-- Department header (click to toggle) -->
                        <div class="flex items-center justify-between p-8 cursor-pointer select-none dept-header"
                             onclick="toggleDept(this)">
                            <div class="flex items-center gap-4">
                                <div class="bg-indigo-50 p-3 rounded-2xl">
                                    <i class="fas fa-building text-indigo-500 text-xl"></i>
                                </div>
                                <div>
                                    <h2 class="text-lg font-extrabold text-gray-800">${escapeHtml(name)}</h2>
                                    <p class="text-xs text-gray-400">${data.professors.length} professor${data.professors.length !== 1 ? "s" : ""} · ${data.ratings.length} review${data.ratings.length !== 1 ? "s" : ""}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="text-right">
                                    <p class="text-2xl font-extrabold text-gray-800">${avg ? avg.toFixed(1) : "N/A"}</p>
                                    <div class="flex justify-end text-sm mt-0.5">
                                        ${avg ? renderStars(avg) : '<span class="text-xs text-gray-400">No ratings yet</span>'}
                                    </div>
                                </div>
                                <i class="fas fa-chevron-down text-gray-400 text-sm dept-arrow transition-transform duration-200"></i>
                            </div>
                        </div>

                        <!-- Collapsible professors grid -->
                        <div class="dept-body hidden px-8 pb-8">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                ${sorted.map(p => {
                                    const avatarSrc = p.profile_picture
                                        ? `${API}/${p.profile_picture}`
                                        : `https://ui-avatars.com/api/?name=${encodeURIComponent(cleanName(p.name))}&background=6366f1&color=fff&size=80`;
                                    return `
                                        <a href="professor-profile.html?id=${p.id}"
                                           class="flex items-center gap-3 p-3 rounded-2xl border border-gray-100 hover:border-indigo-200 hover:bg-indigo-50 transition group">
                                            <img class="w-10 h-10 rounded-full flex-shrink-0 object-cover"
                                                 src="${avatarSrc}" alt="${escapeHtml(p.name)}"
                                                 onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(cleanName(p.name))}&background=6366f1&color=fff&size=80'">
                                            <div class="min-w-0">
                                                <p class="text-sm font-semibold text-gray-800 group-hover:text-indigo-600 truncate">${escapeHtml(p.name)}</p>
                                                <p class="text-xs text-gray-400">View profile</p>
                                            </div>
                                            <i class="fas fa-chevron-right text-gray-300 text-xs ml-auto flex-shrink-0 group-hover:text-indigo-400"></i>
                                        </a>`;
                                }).join("")}
                            </div>
                        </div>
                    </div>`;
            }).join("");
        }

        // Search filter
        document.getElementById("search-input").addEventListener("input", function () {
            const q = this.value.toLowerCase();
            document.querySelectorAll(".dept-card").forEach(card => {
                card.style.display = card.dataset.dept.toLowerCase().includes(q) ? "" : "none";
            });
        });

        initUser();
        loadDepartments();
    </script>
    <!-- Mobile bottom nav -->
    <nav class="mobile-bottom-nav lg:hidden">
        <a href="dashboard.html" class="mobile-nav-item"><i class="fas fa-th-large"></i><span>Home</span></a>
        <a href="professors.html" class="mobile-nav-item"><i class="fas fa-chalkboard-teacher"></i><span>Profs</span></a>
        <a href="departments.html" class="mobile-nav-item mob-active"><i class="fas fa-building"></i><span>Depts</span></a>
        <a href="my-reviews.html" class="mobile-nav-item"><i class="fas fa-star"></i><span>Reviews</span></a>
        <a href="settings.html" class="mobile-nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </nav>
    <script src="notifications.js"></script>
</body>
</html>
