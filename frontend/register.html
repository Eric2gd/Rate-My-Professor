<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Rate My Professor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">🎓</div>
      <h1>Rate My Professor</h1>
      <p>Ashesi University · Sign in to continue</p>
    </div>
 
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Your username" autocomplete="off" />
    </div>
 
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password" />
    </div>
 
    <button class="btn" onclick="login()">Sign In</button>
    <p class="message" id="message"></p>
 
    <div class="auth-link">
      No account yet? <a href="register.html">Register here</a>
    </div>
  </div>
 
  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const msg = document.getElementById("message");
 
      if (!username || !password) {
        msg.textContent = "Please fill in all fields.";
        msg.className = "message error";
        return;
      }
 
      try {
        const response = await fetch("http://localhost:3000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
 
        const data = await response.json();
        msg.textContent = data.message;
        msg.className = response.ok ? "message success" : "message error";
 
        if (response.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("username", username);
          setTimeout(() => window.location.href = "dashboard.html", 1000);
        }
      } catch (err) {
        msg.textContent = "Cannot connect to server. Is it running?";
        msg.className = "message error";
      }
    }
 
    document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
  </script>
</body>
</html>
