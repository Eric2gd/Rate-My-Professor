<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Rate My Professor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="bg-indigo-600 p-3 rounded-2xl mb-4">
        <i class="fas fa-university text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800 tracking-tight">RateMyProf</h1>
      <p class="text-sm text-gray-400 mt-1">Ashesi University · Create an account</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-[32px] shadow-sm border border-gray-100 p-10">

      <div class="mb-6">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Username</label>
        <input id="username" type="text" placeholder="Choose a username" autocomplete="off"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition">
      </div>

      <div class="mb-6">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Password</label>
        <input id="password" type="password" placeholder="Choose a password"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition">
      </div>

      <button onclick="register()"
        class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition">
        Create Account
      </button>

      <p id="message" class="text-sm text-center mt-4 min-h-[20px]"></p>

      <p class="text-center text-sm text-gray-400 mt-6">
        Already have an account?
        <a href="login.html" class="text-indigo-600 font-semibold hover:underline">Sign in here</a>
      </p>
    </div>
  </div>

  <script>
    async function register() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const msg = document.getElementById("message");

      if (!username || !password) {
        msg.textContent = "Please fill in all fields.";
        msg.className = "text-sm text-center mt-4 text-red-500";
        return;
      }

      try {
        const response = await fetch("https://rate-my-professor-real.vercel.app//register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        msg.textContent = data.message;
        msg.className = `text-sm text-center mt-4 ${response.ok ? "text-green-600" : "text-red-500"}`;

        if (response.ok) {
          setTimeout(() => window.location.href = "login.html", 1000);
        }
      } catch (err) {
        msg.textContent = "Cannot connect to server. Is it running?";
        msg.className = "text-sm text-center mt-4 text-red-500";
      }
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") register(); });
  </script>
</body>
</html>
